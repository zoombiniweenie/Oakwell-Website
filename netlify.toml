# Netlify configuration for Oakwell Workforce Limited website
# Deploy: connect GitHub repo to Netlify, no build command needed (pure HTML)

[build]
  publish = "."

# Redirect rules — handle pages subdirectory cleanly
[[redirects]]
  from = "/clients"
  to = "/pages/clients.html"
  status = 200

[[redirects]]
  from = "/workers"
  to = "/pages/workers.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/pages/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/pages/contact.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/pages/privacy.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
